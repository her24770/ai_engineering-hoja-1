name: CD

on:
  push:
    branches: [main]

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package binaries
        run: npx pkg . --output dist-bin/shop502-cart

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop502-cart-binaries
          path: dist-bin/
          retention-days: 30
